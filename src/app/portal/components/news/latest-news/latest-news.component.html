<div class="row d-flex justify-content-between">
  <div class="col-12 col-xl-8 col px-0 p-0" [class.p-0]="mobile">
    <main>
      @if (visible) {
        <div class="row">
          @for (item of data; track item) {
            <app-news-card
              class="latest-news-page px-0"
              #cards
              [item]="item"
            ></app-news-card>
          }
        </div>
      }
    </main>
  </div>
</div>

@if (loading) {
  <div class="row">
    <div class="col-auto px-0 pb-3">
      <mat-spinner
        [diameter]="80"
        i18n-aria-label="@@loading"
        aria-label="Ladataan"
      ></mat-spinner>
    </div>
  </div>
}

@if (!loading) {
  <div class="row">
    <div class="col p-4">
      <app-secondary-button
        i18n-content="@@loadMoreNews"
        content="Lataa lisää uutisia"
        (click)="loadMoreNews()"
      ></app-secondary-button>
    </div>
  </div>
}
