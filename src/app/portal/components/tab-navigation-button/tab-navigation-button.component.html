<a [routerLink]='routerLink' [queryParams]='queryParams' [class.active-text]='active' (click)="buttonClicked()">
  <div>
    {{label}}
  </div>

  @if (count !== -1) {
    <div [countUp]="count" [options]="countOps" [reanimateOnClick]='false'>
      {{count}}
    </div>
  }

  @if (count === -1) {
    <div></div>
  }
</a>
