@if (!resultData) {
  <div class="spinner-center">
    <mat-spinner
      [diameter]="80"
      i18n-aria-label="@@loading"
      aria-label="Ladataan"
    ></mat-spinner>
  </div>
}

<!-- Results -->
@if (resultData?.total > 0) {
  <div>
    <app-table
      [columns]="tableColumns"
      [rows]="tableRows"
      [svgSymbolName]="svgSymbolName"
      [iconTitle]="iconTitleOrganizations"
      iconLinkField="name"
      [sortColumn]="sortService.sortColumn"
      [sortDirection]="sortService.sortDirection ? 'desc' : 'asc'"
      (onSortChange)="utilityService.sortBy($event.active)"
    ></app-table>
    <!-- Pagination -->
    <app-results-pagination [data]="resultData"></app-results-pagination>
  </div>
} @else {
  @if (resultData && resultData.total === 0) {
    <app-no-results
      heading="Ei organisaatioita"
      i18n-heading="@@noOrganizations"
    ></app-no-results>
  }
}
