<!-- Shared component -->
@if (parsedFilters?.length > 0 && translationFlag) {
  <app-active-filters-list
    [filters]="parsedFilters"
    [dialogConfig]="activeFiltersDialogConfig"
    (onRemoveFilter)="removeFilter($event)"
    (onClearFilters)="clearFilters()"
  ></app-active-filters-list>
}
