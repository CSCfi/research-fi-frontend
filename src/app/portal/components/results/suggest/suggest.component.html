@if (currentTab.data === 'publications') {
  <div>
    <h4>Ehdotuksia:</h4>
    @for (suggest of suggests?.options; track suggest) {
      <div
        class="suggests col-center col"
        >
        <li (click)="navigate(suggest.text)">{{ suggest.text }}</li>
      </div>
    }
  </div>
}
