<mat-button-toggle-group
  [multiple]="multiple"
  [vertical]="vertical"
  [name]="name"
  aria-label=""
  >
  @for (item of data; track item) {
    <mat-button-toggle
      [value]="item.label"
      [disabled]="item.disabled"
      [checked]="checked?.includes(item)"
      >@if (multiple) {
      <mat-checkbox
        [disabled]="item.disabled"
        [checked]="checked?.includes(item)"
        >{{ item.label }}</mat-checkbox
        >
      } @else {
        <mat-radio-group name="item.label">
          <mat-radio-button
            [disabled]="item.disabled"
            [checked]="checked?.includes(item)"
            value="item.label"
            >{{ item.label }}</mat-radio-button
            ></mat-radio-group
            >
          }
        </mat-button-toggle>
      }
    </mat-button-toggle-group>
