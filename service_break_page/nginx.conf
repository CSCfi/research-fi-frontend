worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}


http {
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    server {
        listen       8080;
        listen  [::]:8080;
        server_name _;

        # Return 503 for PublicAPI requests
        location /api/rest/ {
            add_header Content-Type application/json;
            add_header Retry-After 300 always; # Tell clients to try again in 5 minutes (300 seconds)
            return 503 '{"error": "service_unavailable", "message": "Research Information Hub API is temporarily unavailable. Please try again later."}';
        }

        location / {
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Disable caching
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}